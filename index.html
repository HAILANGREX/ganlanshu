<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《橄榄树》- 齐豫 | 典藏视听版</title>
    <style>
        /* 全局样式与重置 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: "STSong", "SimSun", "Times New Roman", serif;
            color: #e0e5df;
            /* 优化：平滑的深色系流体渐变，去除了纯黑色，过渡更自然 */
            background: linear-gradient(120deg, #10151a, #161e1a, #1a1920, #0f1618);
            background-size: 300% 300%;
            animation: smoothBg 18s ease infinite;
        }

        @keyframes smoothBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px;
        }

        /* 中心持续发出的音波波纹容器 */
        .ripple-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60px); 
            z-index: 0;
            pointer-events: none;
            display: none;
        }

        .is-playing ~ .ripple-container {
            display: block;
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(216, 206, 179, 0.3); /* 香槟金 */
            box-shadow: 0 0 40px rgba(216, 206, 179, 0.1);
            opacity: 0;
            animation: rippleEffect 8s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }

        .ripple:nth-child(1) { width: 260px; height: 260px; animation-delay: 0s; }
        .ripple:nth-child(2) { width: 260px; height: 260px; animation-delay: 2.6s; }
        .ripple:nth-child(3) { width: 260px; height: 260px; animation-delay: 5.2s; }

        @keyframes rippleEffect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
        }

        /* 新增：鼠标/触屏点击生成的交互式水波纹 */
        .interactive-ripple {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid rgba(216, 206, 179, 0.6);
            box-shadow: 0 0 20px rgba(216, 206, 179, 0.3), inset 0 0 15px rgba(216, 206, 179, 0.2);
            transform: translate(-50%, -50%) scale(0.1);
            animation: clickWaterRipple 2.5s cubic-bezier(0.1, 0.5, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 15; /* 位于唱机上方，粒子下方 */
        }

        @keyframes clickWaterRipple {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0.8; border-width: 2px; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; border-width: 0px; }
        }

        /* --- 唱机外壳 --- */
        .turntable-wrapper {
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            animation: float 8s ease-in-out infinite; 
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .turntable-deck {
            position: relative;
            background: linear-gradient(145deg, #181a1c, #090a0b); 
            border-radius: 20px;
            padding: 40px 30px 45px 30px;
            border: 1px solid #222629;
            border-top-color: #31363a;
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.9),
                0 0 60px rgba(10, 15, 20, 0.5),
                inset 0 1px 2px rgba(255,255,255,0.08),
                inset 0 -5px 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 330px;
            transform: translateZ(30px);
            transition: box-shadow 1.5s ease;
        }

        .turntable-deck.is-playing {
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.9),
                0 0 80px rgba(142, 155, 133, 0.1), 
                inset 0 1px 2px rgba(255,255,255,0.08),
                inset 0 -5px 20px rgba(0,0,0,0.8);
        }

        /* --- 唱片托盘 --- */
        .platter {
            position: relative;
            width: 270px;
            height: 270px;
            border-radius: 50%;
            background: linear-gradient(145deg, #121314, #030404);
            box-shadow: 
                0 15px 30px rgba(0,0,0,0.95), 
                inset 0 2px 4px rgba(255,255,255,0.04);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 45px;
            margin-top: 5px;
            transform: translateZ(10px);
        }

        .vinyl-record {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background-color: #020202;
            background-image: repeating-radial-gradient(
                circle at center,
                #0d0d0d 0,
                #0d0d0d 1px,
                #020202 2px,
                #020202 4px
            );
            box-shadow: inset 0 0 25px rgba(0,0,0,1);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 6s linear infinite;
            animation-play-state: paused;
            transition: filter 1s ease;
        }

        .turntable-deck.is-playing .vinyl-record {
            filter: drop-shadow(0 0 15px rgba(216, 206, 179, 0.15));
        }

        .vinyl-record::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 30deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.08) 10%, 
                rgba(255,255,255,0) 25%, 
                rgba(255,255,255,0) 50%, 
                rgba(255,255,255,0.08) 60%, 
                rgba(255,255,255,0) 75%
            );
            pointer-events: none;
        }

        .vinyl-label {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #182025, #0c1012);
            background-image: url('2727510fd9f9d72a76ced868d42a2834359bbb8c.jpg');
            background-size: cover;
            background-position: center;
            border: 2px solid #0a0a0a;
            box-shadow: 0 0 0 4px #000;
            z-index: 2;
        }

        .spindle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 4px 4px, #d0d0d0, #666, #111);
            border-radius: 50%;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.9), inset 0 -1px 2px rgba(0,0,0,0.6);
            z-index: 5;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- 唱臂 --- */
        .tonearm-container {
            position: absolute;
            top: 40px;
            right: 15px;
            width: 80px;
            height: 220px;
            transform-origin: 40px 40px;
            transform: rotate(-35deg); 
            transition: transform 1.2s cubic-bezier(0.3, 0, 0.1, 1); 
            z-index: 10;
        }

        .tonearm-base {
            position: absolute;
            top: 10px; left: 10px;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 20px 20px, #2a3035, #050608);
            box-shadow: 0 10px 20px rgba(0,0,0,0.9), inset 0 2px 3px rgba(255,255,255,0.08);
        }

        .tonearm-pivot {
            position: absolute;
            top: 22px; left: 22px;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #beb496, #807659, #332f22);
            box-shadow: 0 4px 8px rgba(0,0,0,0.9), inset 0 1px 3px rgba(255,255,255,0.4);
        }

        .tonearm-counterweight {
            position: absolute;
            top: -15px; left: 30px;
            width: 20px; height: 38px;
            background: linear-gradient(90deg, #555, #999, #333, #0a0a0a);
            border-radius: 3px;
            box-shadow: 5px 15px 15px rgba(0,0,0,0.7);
        }

        .tonearm-rod {
            position: absolute;
            top: 40px; left: 36px;
            width: 8px; height: 145px;
            background: linear-gradient(90deg, #777, #cccccc, #333);
            border-radius: 4px;
            box-shadow: 12px 12px 15px rgba(0,0,0,0.8);
        }

        .tonearm-curve {
            position: absolute;
            top: 180px; left: 32px;
            width: 14px; height: 18px;
            background: linear-gradient(135deg, #333, #050505);
            border-radius: 2px;
            transform: rotate(22deg);
            box-shadow: 8px 8px 10px rgba(0,0,0,0.7);
        }

        .tonearm-head {
            position: absolute;
            top: 194px; left: 19px;
            width: 22px; height: 38px;
            background: linear-gradient(145deg, #d4c7a3, #7a7051); 
            border-radius: 2px;
            transform: rotate(22deg);
            box-shadow: 10px 15px 18px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.3);
        }

        .turntable-deck.is-playing .tonearm-container { transform: rotate(16deg); }

        /* --- 毛玻璃质感信息面板 --- */
        .info-plate {
            background: rgba(20, 25, 30, 0.35); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding: 22px 25px 18px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 85%;
            margin-bottom: 25px;
            position: relative;
            transform: translateZ(15px);
        }

        .song-title {
            font-size: 24px;
            letter-spacing: 5px;
            margin: 0 0 8px 0;
            color: #d8ceb3; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            font-weight: normal;
        }

        .artist {
            font-size: 12px;
            color: #8a969f;
            letter-spacing: 2px;
            margin-bottom: 18px;
        }

        /* 连续波形示波器 */
        .wave-container {
            width: 100%;
            height: 35px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        #wave-canvas {
            width: 100%;
            height: 100%;
            display: block;
            mix-blend-mode: screen;
        }

        /* 状态指示灯与文字 */
        .status-light {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: #667580;
            margin-bottom: 25px;
            transform: translateZ(10px);
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #11181d;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.9), 0 1px 1px rgba(255,255,255,0.05);
            transition: all 0.6s ease;
        }

        .turntable-deck.is-playing .led {
            background: #d8ceb3; 
            box-shadow: 0 0 10px #d8ceb3, 0 0 20px rgba(216, 206, 179, 0.5), inset 0 1px 2px #fff;
        }
        
        /* 优化：播放时的文字颜色与波形图保持一致，更显眼 */
        .turntable-deck.is-playing .status-light-text {
            color: #d8ceb3;
            text-shadow: 0 0 10px rgba(216, 206, 179, 0.5);
            font-weight: bold;
        }

        /* 操作按钮 */
        .action-btn {
            background: rgba(30, 35, 40, 0.6); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #9ba7b0;
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 14px 50px;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            letter-spacing: 6px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            outline: none;
            transform: translateZ(20px);
        }

        .action-btn:hover {
            background: rgba(45, 52, 60, 0.8);
            color: #e0e5df;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .action-btn:active {
            transform: translateZ(20px) translateY(3px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

    </style>
</head>
<body>

    <div class="container" id="scene-container">
        
        <div class="turntable-wrapper" id="turntable-wrapper">
            <!-- 唱机 -->
            <div class="turntable-deck" id="turntable">
                
                <div class="tonearm-container">
                    <div class="tonearm-base"></div>
                    <div class="tonearm-counterweight"></div>
                    <div class="tonearm-pivot"></div>
                    <div class="tonearm-rod"></div>
                    <div class="tonearm-curve"></div>
                    <div class="tonearm-head"></div>
                </div>

                <div class="platter">
                    <div class="vinyl-record">
                        <div class="vinyl-label"></div>
                    </div>
                    <div class="spindle"></div>
                </div>

                <!-- 磨砂玻璃铭牌与示波器 -->
                <div class="info-plate">
                    <h1 class="song-title">橄榄树</h1>
                    <div class="artist">演唱：齐豫 | 作词：三毛</div>
                    
                    <div class="wave-container">
                        <canvas id="wave-canvas" width="240" height="35"></canvas>
                    </div>
                </div>
                
                <div class="status-light">
                    <div class="led"></div>
                    <!-- 文本默认暂停时不显示 -->
                    <span class="status-light-text" id="status-text"></span>
                </div>
                
                <button id="play-btn" class="action-btn" onclick="toggleMusic(event)">播 放</button>

                <audio id="bg-music" loop>
                    <source src="ganlanshu-qiyu.mp3" type="audio/mpeg">
                </audio>
            </div>
            
            <!-- 唱机底部持续的柔和波纹 -->
            <div class="ripple-container">
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="ripple"></div>
            </div>
        </div>
    </div>

    <script>
        let isPlaying = false;
        const audio = document.getElementById('bg-music');
        const statusText = document.getElementById('status-text');
        const playBtn = document.getElementById('play-btn');
        const turntable = document.getElementById('turntable');

        // --- 交互优化：文本根据要求修改 ---
        function setPlayingState(playing) {
            isPlaying = playing;
            if (playing) {
                turntable.classList.add('is-playing');
                statusText.innerText = "播放中...";
                playBtn.innerText = "暂 停";
            } else {
                turntable.classList.remove('is-playing');
                statusText.innerText = "";
                playBtn.innerText = "播 放";
            }
        }

        function toggleMusic(e) {
            if(e) e.stopPropagation(); // 阻止波纹事件触发
            if (isPlaying) {
                audio.pause();
                setPlayingState(false);
            } else {
                audio.play().then(() => setPlayingState(true)).catch(e => {
                    setPlayingState(true);
                });
            }
        }

        // --- 交互波纹引擎 (鼠标点击 / 触屏生成水波纹) ---
        function createClickRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.classList.add('interactive-ripple');
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            document.body.appendChild(ripple);
            
            // 动画结束后移除 DOM，避免性能问题
            setTimeout(() => {
                ripple.remove();
            }, 2500);
        }

        // 监听全局点击事件
        window.addEventListener('click', (e) => {
            // 防止点击按钮时出现过多重叠
            if (e.target.id !== 'play-btn') {
                createClickRipple(e.clientX, e.clientY);
            }
        });

        // 监听移动端触摸事件
        window.addEventListener('touchstart', (e) => {
            if (e.target.id !== 'play-btn') {
                for(let i = 0; i < e.touches.length; i++) {
                    createClickRipple(e.touches[i].clientX, e.touches[i].clientY);
                }
            }
        });

        // --- 3D 悬浮交互 ---
        const scene = document.getElementById('scene-container');
        const wrapper = document.getElementById('turntable-wrapper');
        scene.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 60; 
            const yAxis = (window.innerHeight / 2 - e.pageY) / 60;
            wrapper.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        scene.addEventListener('mouseleave', () => {
            wrapper.style.transition = 'transform 0.8s ease';
            wrapper.style.transform = `rotateY(0deg) rotateX(0deg)`;
            setTimeout(() => wrapper.style.transition = 'transform 0.1s ease-out', 800);
        });

        // --- 优雅版示波器 ---
        const waveCanvas = document.getElementById('wave-canvas');
        const waveCtx = waveCanvas.getContext('2d');
        let waveTime = 0;
        let currentAmp = 0;

        function drawWaveform() {
            waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
            
            const targetAmp = isPlaying ? 8 : 0.5; 
            currentAmp += (targetAmp - currentAmp) * 0.05;

            waveCtx.beginPath();
            waveCtx.moveTo(0, waveCanvas.height / 2);

            for (let x = 0; x < waveCanvas.width; x++) {
                let y = Math.sin(x * 0.03 + waveTime) * currentAmp;
                y += Math.sin(x * 0.05 - waveTime * 0.8) * (currentAmp * 0.5);
                
                if (isPlaying) {
                    y += (Math.random() - 0.5) * 0.4;
                }

                const edgeDamping = Math.sin((x / waveCanvas.width) * Math.PI);
                y *= edgeDamping;

                waveCtx.lineTo(x, waveCanvas.height / 2 + y);
            }

            // 香槟金色线条
            waveCtx.strokeStyle = 'rgba(216, 206, 179, 0.8)'; 
            waveCtx.lineWidth = 1; 
            waveCtx.shadowBlur = 5;
            waveCtx.shadowColor = 'rgba(216, 206, 179, 0.5)';
            waveCtx.stroke();
            
            waveCtx.shadowBlur = 0; 
            waveTime += 0.03; 
            requestAnimationFrame(drawWaveform);
        }
        drawWaveform(); 

    </script>
</body>
</html>
